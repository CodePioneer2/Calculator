<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Happy+Monkey&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Rock+Salt&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Calculator</h1>
    <div class="calculator">
      <div class="display">0</div>
      <div class="row">
        <button class="numBtn" name="number" type="button" value="1">1</button>
        <button class="numBtn" name="number" type="button" value="2">2</button>
        <button class="numBtn" name="number" type="button" value="3">3</button>
        <button class="operatorBtn" name="operator" type="button" value="+">
          +
        </button>
      </div>
      <div class="row">
        <button class="numBtn" name="number" type="button" value="4">4</button>
        <button class="numBtn" name="number" type="button" value="5">5</button>
        <button class="numBtn" name="number" type="button" value="6">6</button>
        <button class="operatorBtn" name="operator" type="button" value="-">
          -
        </button>
      </div>
      <div class="row">
        <button class="numBtn" name="number" type="button" value="7">7</button>
        <button class="numBtn" name="number" type="button" value="8">8</button>
        <button class="numBtn" name="number" type="button" value="9">9</button>
        <button class="operatorBtn" name="operator" type="button" value="*">
          *
        </button>
      </div>
      <div class="row">
        <button class="numBtn" name="number" type="button" value="0">0</button>
        <button class="clearBtn" name="clear" type="button" value="clear">
          Clear
        </button>
        <button class="equalsBtn" name="" type="button" value="=">=</button>
        <button class="operatorBtn" name="operator" type="button" value="/">
          /
        </button>
      </div>
    </div>

    <script src="calculator.js"></script>
  </body>
</html>
